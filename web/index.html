<!DOCTYPE html>
<html>
<head>
  <base href="./">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SafiPay - International Digital Banking Solutions">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SafiPay">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SafiPay App</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* استایل اختصاصی لودر طلایی در پس‌زمینه مشکی */
    body {
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .loader {
      border: 5px solid #333;
      border-top: 5px solid #D4AF37; /* طلایی برند */
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 2s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading-indicator" class="loader"></div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.addEventListener('load', function(ev) {
      // حذف لودر پس از لود شدن کامل وب‌اپلیکیشن
      var loader = document.getElementById('loading-indicator');
      if (loader) {
        loader.remove();
      }
    });
  </script>
</body>
</html>
